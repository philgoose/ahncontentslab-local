<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>배경영상 임베드 진단</title>
<style>
  body{font-family:'Malgun Gothic',sans-serif;background:#14264A;color:#fff;margin:0;padding:32px;line-height:1.6}
  .wrap{max-width:900px;margin:0 auto}
  h1{color:#F3B94D;font-size:22px}
  .box{background:#1c3057;border:1px solid rgba(243,185,77,.4);border-radius:12px;padding:20px;margin:20px 0}
  .video{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;overflow:hidden}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  code{background:#0d1a33;padding:2px 8px;border-radius:4px;color:#F3B94D}
  .ok{color:#7CE38B}.bad{color:#FF8A8A}
  ul{padding-left:20px}
</style>
</head>
<body>
<div class="wrap">
  <h1>유튜브 배경영상 임베드 진단</h1>
  <p>영상 ID: <code>ipqws5T3gEs</code></p>

  <div class="box">
    <div class="video">
      <iframe
        src="https://www.youtube.com/embed/ipqws5T3gEs?autoplay=1&mute=1&loop=1&playlist=ipqws5T3gEs&playsinline=1"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen></iframe>
    </div>
  </div>

  <div class="box">
    <p><b>판독법</b></p>
    <ul>
      <li><span class="ok">영상이 재생됨</span> → 영상은 정상. 문제는 사이트 코드(imweb 배경영상 설정) 쪽이다.</li>
      <li><span class="bad">오류 153 / "동영상 재생 불가" 표시</span> → 영상 자체가 임베드 차단·비공개·삭제 상태. 이건 코드로 못 고친다. 유튜브 스튜디오에서 영상 설정을 고쳐야 한다.</li>
    </ul>
  </div>
</div>
</body>
</html>
