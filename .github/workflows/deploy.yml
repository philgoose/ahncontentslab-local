name: Build & Deploy (imweb 자동 정리)

on:
  push:
    branches: [main]
  workflow_dispatch:   # 수동 실행 버튼

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 저장본 자동 정리 (clean_imweb 파이프라인)
        run: python3 tools/build_site.py

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
